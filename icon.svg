  <circle cx="220" cy="225" r="7" fill="white" opacity="0.95" filter="url(#glow)"/>
  <line x1="220" y1="225" x2="195" y2="195" stroke="#c9a84c" stroke-width="1.5" opacity="0.7"/>
  <line x1="220" y1="225" x2="245" y2="195" stroke="#c9a84c" stroke-width="1.5" opacity="0.7"/>
  <line x1="220" y1="225" x2="175" y2="235" stroke="#4488ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="220" y1="225" x2="265" y2="235" stroke="#4488ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="220" y1="225" x2="195" y2="270" stroke="#c9a84c" stroke-width="1.5" opacity="0.7"/>
  <line x1="220" y1="225" x2="245" y2="270" stroke="#c9a84c" stroke-width="1.5" opacity="0.7"/>
  <line x1="195" y1="195" x2="245" y2="195" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
