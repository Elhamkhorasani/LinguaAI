<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#2a3d6e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c46a"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Decorative gold circle -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.2"/>

  <!-- Book shape -->
  <rect x="140" y="150" width="100" height="140" rx="8" fill="url(#gold)" opacity="0.9"/>
  <rect x="148" y="158" width="84" height="124" rx="6" fill="#1a2744"/>
  <!-- Book lines -->
  <line x1="162" y1="185" x2="218" y2="185" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="162" y1="200" x2="218" y2="200" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="162" y1="215" x2="200" y2="215" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="162" y1="230" x2="210" y2="230" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="162" y1="245" x2="205" y2="245" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Book spine -->
  <rect x="236" y="150" width="12" height="140" rx="4" fill="#c9a84c" opacity="0.6"/>

  <!-- AI brain / circuit on right -->
  <circle cx="330" cy="210" r="55" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.8"/>
  <circle cx="330" cy="210" r="40" fill="#1e305a" opacity="0.9"/>
  <!-- Circuit dots -->
  <circle cx="330" cy="210" r="6" fill="url(#gold)"/>
  <circle cx="308" cy="195" r="4" fill="#c9a84c" opacity="0.8"/>
  <circle cx="352" cy="195" r="4" fill="#c9a84c" opacity="0.8"/>
  <circle cx="308" cy="225" r="4" fill="#c9a84c" opacity="0.8"/>
  <circle cx="352" cy="225" r="4" fill="#c9a84c" opacity="0.8"/>
  <!-- Circuit lines -->
  <line x1="330" y1="210" x2="308" y2="195" stroke="#c9a84c" stroke-width="2" opacity="0.7"/>
  <line x1="330" y1="210" x2="352" y2="195" stroke="#c9a84c" stroke-width="2" opacity="0.7"/>
  <line x1="330" y1="210" x2="308" y2="225" stroke="#c9a84c" stroke-width="2" opacity="0.7"/>
  <line x1="330" y1="210" x2="352" y2="225" stroke="#c9a84c" stroke-width="2" opacity="0.7"/>
  <!-- Outer circuit connections -->
  <line x1="308" y1="195" x2="290" y2="183" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <line x1="352" y1="195" x2="370" y2="183" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <line x1="308" y1="225" x2="290" y2="237" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <line x1="352" y1="225" x2="370" y2="237" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <circle cx="290" cy="183" r="3" fill="#c9a84c" opacity="0.6"/>
  <circle cx="370" cy="183" r="3" fill="#c9a84c" opacity="0.6"/>
  <circle cx="290" cy="237" r="3" fill="#c9a84c" opacity="0.6"/>
  <circle cx="370" cy="237" r="3" fill="#c9a84c" opacity="0.6"/>

  <!-- German flag small accent -->
  <rect x="155" y="320" width="60" height="8" rx="2" fill="#222"/>
  <rect x="155" y="328" width="60" height="8" rx="2" fill="#c0392b"/>
  <rect x="155" y="336" width="60" height="8" rx="2" fill="#f1c40f"/>

  <!-- Text: LinguaAI -->
  <text x="256" y="400" font-family="Georgia, serif" font-size="52" font-weight="bold"
        fill="url(#gold)" text-anchor="middle" letter-spacing="2">Lingua</text>
  <text x="256" y="448" font-family="Georgia, serif" font-size="38" font-weight="bold"
        fill="white" text-anchor="middle" letter-spacing="4" opacity="0.9">AI</text>

  <!-- Small star accents -->
  <text x="108" y="270" font-size="20" fill="#c9a84c" opacity="0.5">✦</text>
  <text x="390" y="320" font-size="16" fill="#c9a84c" opacity="0.4">✦</text>
  <text x="130" y="380" font-size="12" fill="#c9a84c" opacity="0.3">✦</text>
</svg>
