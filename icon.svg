<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#1e2d5a"/>
      <stop offset="100%" style="stop-color:#080d1f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d060"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="flagblur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- ══ GERMAN FLAG — subtle, blurred, background ══ -->
  <g opacity="0.18" filter="url(#flagblur)">
    <rect x="30" y="30" width="512" height="155" fill="#222222"/>
    <rect x="30" y="185" width="512" height="155" fill="#cc0000"/>
    <rect x="30" y="340" width="512" height="155" fill="#ffcc00"/>
  </g>

  <!-- Dark overlay to keep background dark -->
  <rect width="512" height="512" rx="100" fill="#080d1f" opacity="0.72"/>

  <!-- Subtle grid -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="#3a5aaa" stroke-width="0.6" opacity="0.12"/>
  <line x1="0" y1="340" x2="512" y2="340" stroke="#3a5aaa" stroke-width="0.6" opacity="0.12"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="#3a5aaa" stroke-width="0.6" opacity="0.12"/>
  <line x1="340" y1="0" x2="340" y2="512" stroke="#3a5aaa" stroke-width="0.6" opacity="0.12"/>

  <!-- Stars -->
  <circle cx="60" cy="55" r="1.8" fill="white" opacity="0.7"/>
  <circle cx="180" cy="35" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="440" cy="65" r="2" fill="#c9a84c" opacity="0.8"/>
  <circle cx="470" cy="130" r="1.4" fill="white" opacity="0.5"/>
  <circle cx="40" cy="180" r="1.6" fill="white" opacity="0.6"/>
  <circle cx="490" cy="300" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="55" cy="400" r="1.2" fill="#c9a84c" opacity="0.6"/>
  <circle cx="460" cy="430" r="1.8" fill="white" opacity="0.5"/>
  <circle cx="130" cy="470" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="380" cy="480" r="1.5" fill="#c9a84c" opacity="0.5"/>

  <!-- ══ AI BRAIN NETWORK ══ -->
  <circle cx="220" cy="230" r="148" fill="none" stroke="#4488ff" stroke-width="1.5" opacity="0.2" filter="url(#glow)"/>
  <circle cx="220" cy="230" r="125" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.15"/>
  <ellipse cx="220" cy="225" rx="95" ry="85" fill="#0d1535" opacity="0.9"/>
  <ellipse cx="220" cy="225" rx="95" ry="85" fill="none" stroke="#4488ff" stroke-width="2" opacity="0.6" filter="url(#softglow)"/>
  <path d="M220 145 Q225 185 220 225 Q215 265 220 305" stroke="#4488ff" stroke-width="1.5" fill="none" opacity="0.4"/>
