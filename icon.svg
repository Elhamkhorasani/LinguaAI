  <line x1="315" y1="225" x2="360" y2="225" stroke="#4488ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="225" x2="125" y2="225" stroke="#4488ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="220" y1="77" x2="220" y2="110" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <circle cx="365" cy="225" r="3.5" fill="#4488ff" opacity="0.7"/>
  <circle cx="75" cy="225" r="3.5" fill="#4488ff" opacity="0.7"/>
  <circle cx="220" cy="72" r="3.5" fill="#c9a84c" opacity="0.7"/>

  <!-- ══ TEXT ══ -->
  <text x="256" y="390" font-family="Georgia,serif" font-size="58" font-weight="bold"
        fill="url(#gold)" text-anchor="middle" letter-spacing="1" filter="url(#softglow)">LinguaAI</text>
  <text x="256" y="425" font-family="'Courier New',monospace" font-size="20"
